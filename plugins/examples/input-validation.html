<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Input Validation – Live Test</title>

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
            max-width: 100%;
            max-height: 400px;
            overflow: auto;
        }

        .mock-form-head {
            font-weight: bold;
            font-size: 20px;
        }

        input {
            padding: 10px;
            font-weight: bold;
            border-radius: 20px;
            border: none;
        }

        button {
            padding: 10px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #0077ff;
            color: white;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
            white-space: nowrap;
        }

        button:hover {
            background: #005fcc;
        }

        button:active {
            transform: scale(0.96);
        }

        #quick-fill {
            text-decoration: underline;
            color: #005fcc;
            cursor: pointer;
        }

        .rules-list {
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔢 NS Input Validation</h1>
        <p>Fill this form quick fast and check if your data is <b>valid</b>!</p>
        <p><b>Don't have time?</b> <span id="quick-fill">Quick fill</span></p>

        <p class="mock-form-head">Quick Mock form: </p>
        <input id="username-input" type="text" placeholder="Enter your username..." /></br></br>
        <input id="gender-input" type="text" placeholder="Enter your gender..." /></br></br>
        <input id="age-input" type="number" placeholder="Enter your age..." /></br></br>

        <hr>

        <p><b>Rules:</b></p>
        <ul class="rules-list">
            <li>You must mention your username</li>
            <li>You must choose a valid gender (male, female, other)</li>
            <li>You must choose a valid age between 0 and 130</li>
        </ul>

        <button id="validate-btn">Validate your data!</button>
    </div>

    <script src="../../main.min.js"></script>
    <script src="../input-validation.js"></script>

    <script>
        NS("#quick-fill").on("click", function () {
            NS("#username-input").setVal("Kasane Teto");
            NS("#gender-input").setVal("female");
            NS("#age-input").setVal("31");
        });

        NS("#validate-btn").on("click", function () {
            const isValidUsername = NS.validate("#username-input", {
                required: true
            });

            if (!isValidUsername) return alert("Make sure you passed a correct username!");

            const isValidGender = NS.validate("#gender-input", {
                required: true,
                enum: ["male", "female", "other"]
            });

            if (!isValidGender) return alert("Allowed gender values: male, female, other");

            const isValidAge = NS.validate("#age-input", {
                required: true,
                min: 0,
                max: 130
            });

            if (!isValidAge) return alert("Max age 130, min age 0.");

            alert("Your data is valid!");
        });
    </script>
</body>

</html>
