<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Theme Toggle – Live Test</title>

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Dark theme class */
        body.dark-mode {
            background: #1a1a1a;
            color: #eee;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
        }

        body.dark-mode .container {
            border-color: #444;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        button {
            padding: 10px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #0077ff;
            color: white;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background: #005fcc;
        }

        button:active {
            transform: scale(0.96);
        }

        textarea {
            background-color: #000000;
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 80%;
            height: 60px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 NS Live Counter</h1>
        <p>Start typing in the <b>textarea</b> to see live updates!</p>

        <textarea id="my-textarea" placeholder="Start typing..."></textarea>
        <p id="counter">0/10</p>
    </div>

    <script src="../../main.min.js"></script>
    <script src="../live-counter.js"></script>
    <script>
        NS.liveCounter({
            element: "#my-textarea",
            counter: "#counter",
            max: 10,
            onLimit: () => {
                console.log("Somehow, you text is too long.");
            }
        });
    </script>
</body>

</html>
