<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Find – Find Array Test</title>

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
            max-width: 100%;
        }

        input {
            padding: 10px;
            font-weight: bold;
            border-radius: 20px;
            border: none;
        }

        .songs-list {
            text-align: left;
            max-height: 200px;
            overflow: auto;
        }

        .song {
            background-color: #222;
            color: white;
            padding: 10px;
            border-radius: 7px;
            margin: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .song:hover {
            background-color: #444;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔍 NS FindArray</h1>
        <p>Type something and watch the live filter!</p>

        <input id="teto-songs-input" type="text" placeholder="Enter song name.." /></br></br>

        <div class="songs-list">
            <div class="song">Voices In My Head feat. <b>Kasane Teto</b></div>
            <div class="song">Execution Clap feat. <b>Kasane Teto</b></div>
            <div class="song">YARARARA feat. <b>Kasane Teto</b></div>
            <div class="song">Pixel Down. feat <b>Kasane Teto</b></div>
            <div class="song">Cult. feat <b>Kasane Teto</b></div>
        </div>

        <p><b>Note: </b> This list should be <b>NOT</b> be large to avoid lagging.</p>
    </div>

    <script src="../../main.min.js"></script>
    <script src="../find-array.js"></script>
    <script>
        NS.findArray({
            items: document.querySelectorAll(".song"),
            element: "#teto-songs-input"
        });

        NS(".song").each(song => {
            NS(song).on("click", function () {
                alert(`We all love listening to ${NS(song).getText()[0]}!`);
            });
        })
    </script>
</body>

</html>
