<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Find – Find Array Test</title>

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
            max-width: 100%;
        }

        button {
            padding: 10px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #0077ff;
            color: white;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background: #005fcc;
        }

        button:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 NS Copy</h1>
        <p>Click "Copy" to copy the text!</p>

        <button id="copy-btn">Copy</button>

        <p id="copy-text">You can <b>copy</b> me by clicking the button!</p>
    </div>

    <script src="../../main.min.js"></script>
    <script src="../copy.js"></script>
    <script>
        NS("#copy-btn").on("click", function () {
            NS.copy({
                text: NS("#copy-text").getText()[0],
                onSuccess: (text) => {
                    alert(`Copied: ${text}`);
                },

                onFailure: (e) => {
                    alert(`Failed: ${e.message}`);

                }
            });
        });
    </script>
</body>

</html>
