<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Theme Toggle – Live Test</title>

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Dark theme class */
        body.dark-mode {
            background: #1a1a1a;
            color: #eee;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
        }

        body.dark-mode .container {
            border-color: #444;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        button {
            padding: 10px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #0077ff;
            color: white;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background: #005fcc;
        }

        button:active {
            transform: scale(0.96);
        }

        .status {
            margin-top: 20px;
            font-size: 0.95rem;
            opacity: 0.8;
        }

        code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        body.dark-mode code {
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌗 NS Theme Toggle</h1>
        <p>Click the button to switch between <strong>light</strong> and <strong>dark</strong> modes.</p>

        <button id="theme-toggle">🌙 Switch to Dark</button>

        <div class="status">
            💾 localStorage key: <code>my-theme</code><br />
            Current value: <code id="theme-display">light</code>
        </div>
    </div>

    <script src="../../main.min.js"></script>
    <script src="../theme-toggle.js"></script>
    <script>
        const current = NS.theme({
            key: "my-theme",
            value: "dark",
            theme: "dark-mode",
        });

        function updateStatus() {
            NS("#theme-display").setText(current);

            if (current === "dark") {
                NS("#theme-toggle").setText("☀️ Switch to Light");
            } else {
                NS("#theme-toggle").setText("🌙 Switch to Dark");
            }
        }

        NS("#theme-toggle").on("click", function () {
            NS.themeToggle({
                key: "my-theme",
                firstValue: "light",
                secondValue: "dark",
                theme: "dark-mode",
                defaultValue: "light"
            });

            updateStatus()
        });

        updateStatus();
    </script>

</body>

</html>
