<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Theme Toggle – Live Test</title>

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Dark theme class */
        body.dark-mode {
            background: #1a1a1a;
            color: #eee;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
            max-height: 400px;
            overflow: auto;
        }

        body.dark-mode .container {
            border-color: #444;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        button {
            padding: 10px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #0077ff;
            color: white;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background: #005fcc;
        }

        button:active {
            transform: scale(0.96);
        }

        textarea {
            background-color: #000000;
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 80%;
            height: 60px;
        }

        code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        .mock-form {
            font-size: 20px;
        }

        input {
            padding: 10px;
            font-weight: bold;
            border-radius: 20px;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>👻 NS Ghost State</h1>
        <p>Type or check something, tap <code>Ctrl+R</code> and all your text will be saved even with a refresh!</p>
        <p class="mock-form"><b>Mock form:</b></p>

        <input id="username-input" type="text" placeholder="Enter your name..." /></br></br>
        <input id="age-input" type="text" placeholder="Enter your age..." />

        <p><b>Gender:</b></p>
        <div class="gender-select">
            <input type="radio" name="gender" value="male" checked>
            <label>Male</label>
            <input type="radio" name="gender" value="female">
            <label>Female</label>
        </div>

        <p><b>Choose your favorite meals:</b></p>
        <div class="foo-select">
            <input type="checkbox" checked>
            <label>Burger</label>

            <input type="checkbox">
            <label>Fried Chicken</label>

            <input type="checkbox">
            <label>Tomato Soup</label></br></br>
        </div>

        <button id="clear-btn">Clear username</button>
    </div>

    <script src="../../main.min.js"></script>
    <script src="../ghost-state.js"></script>
    <script>
        // Working to create the plugin soon.
    </script>
</body>

</html>
