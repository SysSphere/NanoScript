<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: aliceblue;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }

        button {
            background-color: red;
            border: none;
            font-weight: bold;
            padding: 10px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background-color: darkred;
            transform: scale(1.05);
        }

        @keyframes scale {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.5);
            }

            100% {
                transform: scale(1);
            }
        }

        p {
            font-size: 20px;
        }

        .blue {
            color: blue !important;
        }
    </style>
</head>

<body>
    <h1>This page is in normal JavaScript (JS)!</h1>
    <p class="p">See me getting bigger!</p>
    <p>Click the button to fetch a joke!</p>
    <a href="nanojs.html">Click here for page using NanoScript js</a>

    <button>Click me!</button>
    <script src="main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const p = document.querySelector(".p");
            const button = document.querySelector("button");
            const h1 = document.querySelector("h1");
            p.style.color = "red";
            p.style.animation = "scale 1.4s ease";
            button.addEventListener("click", () => {
                h1.textContent = "You clicked the button!";
                h1.style.color = "orange";
                setTimeout(() => {
                    h1.classList.add("blue");
                }, 1000);
                async function getJoke() {
                    try {
                        const response = await fetch("https://v2.jokeapi.dev/joke/Any?type=single");
                        const data = await response.json();
                        p.textContent = data.joke;
                    } catch (error) {
                        p.textContent = "Error: " + error;
                    }
                }
                getJoke();
            });
        });
    </script>
</body>

</html>
