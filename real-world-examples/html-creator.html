<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real World Example App Using NS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        /* Light theme (default) */
        body {
            background: #f0f0f0;
            color: #222;
            font-family: system-ui, sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE 10+ */
        }

        /* Dark theme class */
        body.dark-mode {
            background: #1a1a1a;
            color: #eee;
        }

        .container {
            background: inherit;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid #ccc;
            max-width: 100%;
            position: relative;
            max-height: 400px;
            overflow: auto;
        }

        input {
            padding: 10px;
            font-weight: bold;
            border-radius: 20px;
            border: none;
        }

        button {
            padding: 10px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #0077ff;
            color: white;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
            white-space: nowrap;
        }

        button:hover {
            background: #005fcc;
        }

        button:active {
            transform: scale(0.96);
        }

        .group,
        .options-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #text-editor {
            background-color: #222;
            color: white;
            padding: 10px;
            margin-top: 20px;
            border-radius: 20px;
            max-width: 300px;
            height: 200px;
            overflow: auto;
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        @media (max-width: 768px) {
            .options-group {
                justify-content: flex-start;
                overflow: auto;
                margin: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="text-to-type">💻 HTML Creator</h1>
        <p>Use the text editor to create rich text, then click <b>Create</b> to get the HTML</p>

        <div class="group">
            <button class="text-editor-panel-btn" onclick="exec('bold')"><i class="fas fa-bold"></i></button>
            <button class="text-editor-panel-btn" onclick="exec('italic')"><i class="fas fa-italic"></i></button>
            <button class="text-editor-panel-btn" onclick="exec('underline')"><i class="fas fa-underline"></i></button>
        </div>

        <div id="text-editor" contenteditable="true"></div></br>

        <div class="options-group">
            <button id="create-btn">
                <i class="fas fa-plus"></i> Create
            </button>

            <button id="copy-btn">
                <i class="fas fa-copy"></i> Copy
            </button>

            <button id="clear-btn">
                <i class="fas fa-trash"></i> Clear
            </button>
        </div>

        <p>
            <b>Note:</b>
            Clicking <b>"Create"</b> will swap the text area content to the generated HTML content.
        </p>
    </div>

    <!-- 🚀🚀🚀 Load the plugins 🚀🚀🚀 -->
    <script src="../main.min.js"></script>
    <script src="../plugins/ghost-state.js"></script>
    <script src="../plugins/copy.js"></script>
    <script src="../plugins/input-validation.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Ghost state
        NS.getGhostState();
        NS.ghostState("#text-editor", "html");

        // Commands handler
        function exec(command) {
            const selection = window.getSelection();
            if (selection.rangeCount === 0) return;
            const anchorNode = selection.anchorNode;
            const currentElement = anchorNode.nodeType === Node.ELEMENT_NODE ? anchorNode : anchorNode.parentElement;
            const isInsideContent = currentElement.closest("#text-editor");

            if (!isInsideContent) {
                selection.removeAllRanges();
                return;
            }

            if (selection) document.execCommand(command, false, selection.toString());
        }

        // Did you provide me content? Let's find out!
        function checkIfHasContent() {
            const hasContent = NS.validate("#text-editor", "text", {
                required: true
            });

            return hasContent;
        }

        // The panel buttons
        NS("#create-btn").on("click", function () {
            const check = checkIfHasContent();
            if (!check) return Swal.fire({
                title: "Please enter some content!"
            });

            NS("#text-editor").setText(
                NS("#text-editor").html()
            );
        });

        NS("#copy-btn").on("click", function () {
            const check = checkIfHasContent();
            if (!check) return Swal.fire({
                title: "Please enter some content!"
            });

            NS.copy({
                text: NS("#text-editor").getText(),
                onSuccess: () => {
                    Swal.fire({
                        icon: "success",
                        title: "Copied!"
                    });
                },

                onFailure: (e) => {
                    Swal.fire({
                        icon: "error",
                        title: `Failed to copy: ${e.message}`
                    });
                }
            });
        });

        NS("#clear-btn").on("click", function () {
            const check = checkIfHasContent();
            if (!check) return Swal.fire({
                title: "Please enter some content!"
            });

            NS.clearGhostState("#text-editor", () => {
                location.reload();
            });
        });
    </script>
</body>

</html>
